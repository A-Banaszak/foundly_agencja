<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      height: 132px;
      background-color: #050505;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .brand-title {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      font-style: italic;
      color: #ffffff;
      display: flex;
      align-items: center;
    }
    .brand-dot {
      color: #6366f1;
      font-style: normal;
      font-weight: 700;
    }
    .brand-badge {
      font-style: normal;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.15);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.35);
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="logo-container">
    <span class="brand-title">
      Foundly<span class="brand-dot">.</span>
    </span>
    <span class="brand-badge">
      AGENCJA
    </span>
  </div>
</body>
</html>
