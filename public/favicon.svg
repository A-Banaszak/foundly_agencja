<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0e7ff" />
    </linearGradient>
  </defs>

  <!-- Background rounded card -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  <rect x="12" y="12" width="488" height="488" rx="116" stroke="url(#border-grad)" stroke-width="16" stroke-opacity="0.5" />

  <!-- Soft Indigo Glow -->
  <circle cx="256" cy="256" r="180" fill="#6366f1" fill-opacity="0.2" />

  <!-- Letter F + Dot -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
    <text x="210" y="365" font-size="340" font-weight="900" font-style="italic" fill="url(#text-grad)" text-anchor="middle" letter-spacing="-10">F</text>
    <circle cx="370" cy="335" r="32" fill="#6366f1" />
  </g>
</svg>
